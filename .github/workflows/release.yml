name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Verify and publish
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Match tag to package version
        run: |
          node -e "const version = require('./package.json').version; if (process.env.GITHUB_REF_NAME !== 'v' + version) throw new Error('tag must equal v' + version)"
      - run: npm run verify
      - run: npm pack
      - uses: actions/upload-artifact@v4
        with:
          name: npm-package-${{ github.ref_name }}
          path: nfse-js-*.tgz
          if-no-files-found: error
      - name: Publish with provenance
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG=latest
          case "$VERSION" in
            *-*) TAG=next ;;
          esac
          npm publish --access public --provenance --tag "$TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
