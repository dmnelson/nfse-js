name: Review schema bundle

on:
  workflow_dispatch:
    inputs:
      source:
        description: Official schema ZIP URL
        required: true
        type: string
      sha256:
        description: Independently verified SHA-256 digest of the ZIP
        required: true
        type: string
      version:
        description: National schema version
        required: true
        default: "1.01"
        type: string

permissions:
  contents: read

jobs:
  stage:
    name: Stage and compare
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npm run schema:stage -- --source "$SCHEMA_SOURCE" --sha256 "$SCHEMA_SHA256" --version "$SCHEMA_VERSION" --output .schema-staging/review
        env:
          SCHEMA_SOURCE: ${{ inputs.source }}
          SCHEMA_SHA256: ${{ inputs.sha256 }}
          SCHEMA_VERSION: ${{ inputs.version }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: national-nfse-schema-${{ inputs.version }}
          path: .schema-staging/review
          if-no-files-found: error
